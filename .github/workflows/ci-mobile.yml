name: CI - Build Mobile App

on:
  push:
    branches: [main]
    paths:
      - "shatter-mobile/**"
      - ".github/workflows/ci-mobile.yml"
  pull_request:
    paths:
      - "shatter-mobile/**"
      - ".github/workflows/ci-mobile.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: shatter-mobile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: shatter-mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Expo CLI
        run: npm install -g expo-cli

      - name: Build Expo static export
        run: npx expo export

      - name: Compress build artifact
        run: |
          tar -czf mobile-dist-${{ github.run_number }}.tar.gz dist

      - name: Upload mobile artifact
        uses: actions/upload-artifact@v4
        with:
          name: mobile-dist-${{ github.run_number }}
          path: shatter-mobile/mobile-dist-${{ github.run_number }}.tar.gz